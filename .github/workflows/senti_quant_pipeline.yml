name: Senti-Quant Pipeline

on:
  schedule:
    - cron: '43 0,8 * * 1-5'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: senti-quant-pipeline
  cancel-in-progress: false

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      HF_TOKEN: ${{ secrets.HF_TOKEN }}
      PYTHONUNBUFFERED: '1'
      PYTHONPATH: ${{ github.workspace }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate required secrets
        shell: bash
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "DATABASE_URL secret is missing"
            exit 1
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Log job start time
        shell: bash
        run: |
          echo "UTC time: $(date -u '+%Y-%m-%d %H:%M:%S %Z')"
          echo "WIB time: $(TZ=Asia/Jakarta date '+%Y-%m-%d %H:%M:%S %Z')"

      - name: Run Senti-Quant pipeline
        shell: bash
        run: |
          set -o pipefail
          python -m src.main 2>&1 | tee pipeline.log

      - name: Send Telegram notification on success
        if: success()
        shell: bash
        run: |
          CLEANUP_LINE=$(grep '^PIPELINE_CLEANUP_METRICS=' pipeline.log | tail -n 1 || echo '{}')
          CLEANUP_JSON="${CLEANUP_LINE#PIPELINE_CLEANUP_METRICS=}"
          ESCAPED_MESSAGE=$'✅ <b>Senti-Quant Pipeline Sukses</b>%0A%0A<b>Repository:</b> ${{ github.repository }}%0A<b>Branch:</b> ${{ github.ref_name }}%0A<b>Commit:</b> ${{ github.sha }}%0A<b>Run ID:</b> ${{ github.run_id }}%0A%0A<b>Cleanup Metrics:</b>%0A<pre>'$(echo "$CLEANUP_JSON" | sed 's/</\&lt;/g;s/>/\&gt;/g;s/&/\&amp;/g')'</pre>%0A%0ACheck logs: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}'
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_CHAT_ID}" \
            -d "text=${ESCAPED_MESSAGE}" \
            -d "parse_mode=HTML" || true

      - name: Send Telegram notification on failure
        if: failure()
        shell: bash
        run: |
          ESCAPED_MESSAGE=$(cat <<'EOF' | sed 's/"/\\"/g' | sed ':a;N;$!ba;s/\n/%0A/g'
          ❌ *Senti-Quant Pipeline Failed*

          *Repository:* ${{ github.repository }}
          *Branch:* ${{ github.ref_name }}
          *Commit:* ${{ github.sha }}
          *Run ID:* ${{ github.run_id }}

          Check logs: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          EOF
          )
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_CHAT_ID}" \
            -d "text=${ESCAPED_MESSAGE}" \
            -d "parse_mode=Markdown" || true